engine:
  name: backtrader

broker:
  starting_cash: 1000000
  account_mode: futures
  slip_perc: 0.0
  coc: false

tushare:
  token_env: TUSHARE_TOKEN
  default_api: pro_bar
  asset: FT
  freq: 1min
  adj: null
  use_cache: true
  incremental: true
  overlap_days: 3
  request_interval_seconds: 31
  max_retries: 3
  retry_sleep_seconds: 65

commission_default:
  commission: 0.0001
  mult: 10
  margin: 8000
  margin_rate: null
  commtype: perc

symbols:
  rb2605:
    tick_size: 1
    size_step: 1
    min_size: 1
    price_precision: 0
    mult: 10
    commission: 0.0001
    commtype: perc
    margin: 8000
    margin_rate: null

output:
  tag: cta_mtf_tushare_demo

strategy:
  name: cta_trend
  params:
    fast: 10
    slow: 30
    atr_period: 14
    atr_stop_mult: 2.0
    risk_per_trade: 0.01
    max_positions: 1
    min_size: 1
    printlog: true

data:
  - name: rb2605_1m
    symbol: rb2605
    role: exec
    source: tushare
    ts_code: RB2605.SHF
    api: pro_bar
    asset: FT
    freq: 1min
    start_date: "2026-02-01 09:00:00"
    end_date: "2026-03-12 15:00:00"
    cache_csv: my_bt_lab/data/cache/RB2605_SHF_1min.csv
    refresh: false
    timeframe: minutes
    compression: 1

resample:
  - source: rb2605_1m
    name: rb2605_60m
    symbol: rb2605
    role: signal
    timeframe: minutes
    compression: 60

report:
  html: true
  title: Tushare期货1m执行60m信号回测报告
  out_folder: report_html
  asset_dir: null